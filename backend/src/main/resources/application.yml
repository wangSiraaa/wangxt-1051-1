server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: sand-mining-permit
  datasource:
    url: jdbc:h2:file:./data/sand_mining;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

app:
  forbidden-periods:
    - start: "03-01"
      end: "06-30"
      description: "汛期禁采期"
  annual-quota-default: 100000
